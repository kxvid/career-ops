# -- Search queries --
# Token-cost: each query is a WebSearch. Keep tight and US-focused.

search_queries:
  - name: Greenhouse — IT/Infra/Security US
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("IT Systems Engineer" OR "Infrastructure Engineer" OR "Cloud Engineer" OR "Security Engineer") United States'
    enabled: true

  - name: Greenhouse — Compliance/GRC US
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("Compliance Engineer" OR "GRC" OR "CMMC" OR "FedRAMP" OR "Security Architect") United States'
    enabled: true

  - name: Greenhouse — IAM/Cloud US
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ("IAM Engineer" OR "Identity Engineer" OR "Cloud Architect" OR "Solutions Architect") United States'
    enabled: true

  - name: Ashby — IT/Infra/Security US
    query: 'site:jobs.ashbyhq.com ("IT Engineer" OR "Infrastructure Engineer" OR "Cloud Engineer" OR "Security Engineer") United States'
    enabled: true

  - name: Ashby — Compliance/GRC US
    query: 'site:jobs.ashbyhq.com ("Compliance" OR "GRC" OR "Security Architect" OR "FedRAMP" OR "CMMC")'
    enabled: true

  - name: Lever — IT/Cloud/Security US
    query: 'site:jobs.lever.co ("IT Systems" OR "Cloud Engineer" OR "Security Engineer" OR "Compliance") United States'
    enabled: true

  - name: Defense Tech — Anduril/Palantir/Shield AI
    query: '("Anduril" OR "Palantir" OR "Shield AI" OR "Saronic") ("IT" OR "Infrastructure" OR "Security" OR "Cloud" OR "Compliance" OR "IAM") site:boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  - name: AWS / Microsoft / Google — Security & GovCloud
    query: '("AWS GovCloud" OR "Azure Government" OR "Microsoft Federal" OR "Google Public Sector") ("Security Engineer" OR "Cloud Engineer" OR "Solutions Architect")'
    enabled: true

  - name: HN Who's Hiring — IT/Infra/Security US
    query: 'site:news.ycombinator.com OR site:hnrss.org ("IT Systems" OR "Security Engineer" OR "Cloud Engineer" OR "Compliance Engineer") United States remote'
    enabled: true

