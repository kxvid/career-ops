# Portal Scanner Configuration -- Kov Rastogi
# Target: IT Systems / Cloud / Security / Compliance / IAM Engineer roles
# Geo: CA (LA, OC, SD, SF) > Seattle, NYC > TX (Austin, Dallas, Houston), FL (Miami, Tampa, Orlando) > US-remote
# Comp floor: $120K base.

# -- Title filter --
# Positive must match >=1; negative must match 0.

title_filter:
  positive:
    # -- IT / Infra --
    - "IT Systems Engineer"
    - "Systems Engineer"
    - "Infrastructure Engineer"
    - "Site Reliability"
    - "SRE"
    - "Platform Engineer"
    - "DevOps"
    - "Sysadmin"
    - "System Administrator"
    - "Endpoint Engineer"
    - "Endpoint Management"
    - "Corporate IT"
    - "Enterprise IT"
    # -- Cloud --
    - "Cloud Engineer"
    - "Cloud Infrastructure"
    - "Cloud Operations"
    - "CloudOps"
    - "Azure Engineer"
    - "AWS Engineer"
    - "GCP Engineer"
    - "Solutions Architect"
    - "Cloud Architect"
    # -- Security / GRC / Compliance --
    - "Security Engineer"
    - "Cybersecurity"
    - "Cyber Security"
    - "Information Security"
    - "InfoSec"
    - "SecOps"
    - "Security Operations"
    - "Detection Engineer"
    - "Compliance Engineer"
    - "Compliance Analyst"
    - "GRC"
    - "Governance Risk Compliance"
    - "Risk Engineer"
    - "Audit Engineer"
    - "CMMC"
    - "NIST"
    - "FedRAMP"
    - "Zero Trust"
    - "Security Architect"
    - "Vulnerability"
    # -- IAM --
    - "IAM Engineer"
    - "Identity Engineer"
    - "Access Management"
    - "Okta Engineer"
    - "Identity & Access"
    # -- Data / Analytics (adjacent) --
    - "Data Engineer"
    - "Analytics Engineer"
    - "Snowflake Engineer"
    # -- Solutions / Customer (adjacent) --
    - "Solutions Engineer"
    - "Customer Engineer"
    - "Forward Deployed"
    - "Implementation Engineer"
    - "Technical Account Manager"
  negative:
    # Wrong stack / domain
    - "iOS"
    - "Android"
    - "Mobile Developer"
    - "Frontend"
    - "Front-End"
    - "Front End"
    - "React Developer"
    - "UI Engineer"
    - "Game"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "RF Engineer"
    - "Mainframe"
    - "COBOL"
    - "Mechanical Engineer"
    - "Electrical Engineer"
    # Roles outside his current capabilities
    - "Machine Learning Engineer"
    - "ML Engineer"
    - "ML Researcher"
    - "Deep Learning"
    - "NLP Engineer"
    - "Research Scientist"
    - "Research Engineer"
    - "Applied Scientist"
    - "Data Scientist"
    - "Quantitative"
    - "Quant"
    # Too senior (he's mid-level, graduated June 2024)
    - "Engineering Manager"
    - "Manager,"
    - "Manager of"
    - "Director,"
    - "Director of"
    - "Head of"
    - "VP "
    - "VP,"
    - "Vice President"
    - "Distinguished"
    - "Fellow Engineer"
    # Junior / unpaid / sales
    - "Intern"
    - "Internship"
    - "New Grad"
    - "New-Grad"
    - "Sales Development"
    - "SDR"
    - "BDR"
    - "Account Executive"
    - "Recruiter"
    # Admin-only roles below his level
    - "Salesforce Admin"
    - "SAP Basis"
    - "SAP Admin"
    - "Oracle DBA"
    - "Help Desk"
    - "Helpdesk"
